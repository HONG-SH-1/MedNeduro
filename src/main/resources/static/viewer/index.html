<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MedNeuro - NII 2D/3D Viewer</title>

    <!--
    <body>
     └─ div.app
         ├─ header.topbar
         └─ div#layoutRoot.layout
             ├─ div.layout-top
             │   └─ div.tabsbar
             ├─ aside.iconbar
             ├─ aside#toolPanel.tool-panel
             ├─ main.main
             │   ├─ section#uploadView
             │   ├─ section#analysis2DView
             │   └─ section#view3D
             ├─ aside.rightbar
             └─ button#btnToolToggle
    -->

    <!-- ✅ CSS -->
    <link rel="stylesheet" href="./css/style.css"/>

    <!-- ✅ jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- ✅ Three.js (app.js에서 window.THREE로 쓰는 구조 유지) -->
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
          }
        }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
        import { OBJLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/OBJLoader.js";

        window.THREE = THREE;
        window.OrbitControls = OrbitControls;
        window.OBJLoader = OBJLoader;
    </script>

    <!-- 2025-12-23  아이콘 추가-->
    <link rel="stylesheet"href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">


</head>

<body>
<div class="app">

    <!-- ✅ 상단바: 브랜드 + 최근 분석만 -->
    <header class="topbar">
        <div class="brand">MedNeuro</div>
    </header>

    <!-- ✅ 레이아웃 루트 -->
    <div id="layoutRoot" class="layout tools-open upload-mode">

        <!-- ✅ (수정 1) tabsbar를 layoutRoot 안 맨 위(1행)로 이동 -->
        <div class="layout-top">
            <div class="tabsbar">
                <div id="tabs" class="tabs"></div>
                <button id="btnNewTab" class="tab-plus" type="button" aria-label="새 탭 추가">＋</button>
            </div>
        </div>

        <!-- 2025-12-23  아이콘 추가-->
        <!-- ✅ 왼쪽 얇은 바 -->
        <aside class="iconbar">
            <button id="btnUpload" ><span class="material-symbols-outlined">upload</span>Upload</button>
            <button id="2dBtn"><span class="material-symbols-outlined">replace_image</span>2D</button>
            <button id="3dBtn"><span class="material-symbols-outlined">deployed_code</span>3D</button>
            <button id="logOutBtn" ><span class="material-symbols-outlined">Logout</span></button>
        </aside>

        <!-- ✅ 축 버튼 패널 -->
        <aside id="toolPanel" class="tool-panel hidden">
            <div class="tool-panel-head">Axis</div>
            <div class="tool-buttons">
                <button class="btn axis" data-axis="axial"><img src="img/axial.PNG"></button>
                <button class="btn axis" data-axis="coronal"><img src="img/coronal.PNG"></button>
                <button class="btn axis" data-axis="sagittal"><img src="img/sagital.PNG"></button>
            </div>
        </aside>

        <!-- ✅ 중앙 메인 -->
        <main class="main">
            <!-- (화면 1) 업로드 -->
            <section id="uploadView" class="panel">
                <div id="dropzone" class="dropzone">
                    <div class="dropzone-box">
                        <div class="dropzone-title">파일 업로드 창</div>
                        <div class="dropzone-sub">여기에 .nii 파일을 드래그하세요</div>
                        <div class="dropzone-sub2">또는 오른쪽 아래 업로드 버튼</div>
                    </div>
                </div>

                <input id="fileInput" type="file" accept=".nii,.nii.gz" hidden />

                <div class="status">
                    <div>서버 상태: <span id="serverHealth" class="badge">확인중...</span></div>
                    <div>업로드 파일: <span id="fileName" class="muted">없음</span></div>
                </div>
            </section>

            <!-- (화면 2) 2D -->
            <section id="analysis2DView" class="panel hidden thumbs-open">
                <div class="viewer-header">
                    <div class="viewer-title" id="viewerTitle">2D 이미지</div>
                    <!-- (수정 3) 우측 상단 썸네일 버튼 제거: 이제 thumbbar 안에서 토글 -->
                    <div class="viewer-actions"></div>
                </div>

                <div class="viewer-body">
                    <!-- (수정 2) 이미지 영역은 CSS에서 크게(가로/세로 체감 2배) -->
                    <div class="image-stage">
                        <img id="mainSlice" alt="SELECT AXIS"/>
                        <div id="sliceHint" class="hint">휠로 이동 </div>
                    </div>
                </div>

                <!-- ✅ (수정 3) thumbbar 내부에 토글 버튼(▲/▼) 추가 -->
                <div id="thumbBar" class="thumbbar">
                    <div class="thumbbar-head">
                        <div class="thumbbar-title">Thumbnails</div>
                        <button id="btnThumbToggle" class="thumb-toggle" type="button" aria-label="썸네일 접기/펼치기">▲</button>
                    </div>

                    <div id="thumbList" class="thumb-list"></div>
                </div>
            </section>

            <!-- (화면 3) 3D -->
            <section id="view3D" class="panel hidden">
                <div class="viewer-header">
                    <div class="viewer-title">3D 화면</div>
                    <div class="viewer-actions">
                        <button id="btnBackTo2D" class="btn">2D 변환</button>
                    </div>
                </div>

                <div class="three-wrap">
                    <div id="threeCanvas" class="three-canvas"></div>
                </div>
            </section>
        </main>

        <!-- ✅ 우측 정보/버튼
        <aside class="rightbar">
            <div class="info-card">Patient Info</div>
            <div class="info-card">Surgical Info</div>
            <div class="info-card">Diagnostic Info</div>

            <div class="right-actions">
                <button id="btnUpload" class="btn big">Upload</button>
                <button id="btn3D" class="btn big">3D Conversion</button>
                <button id="btnAnalyze" class="btn big">Analyze</button>
            </div>
        </aside>
 -->

        <!-- ✅ 접기/펼치기 핸들 -->
        <button id="btnToolToggle" class="tool-handle hidden" type="button">◀</button>
    </div>
</div>

<!-- ✅ JS (ES Module 엔트리) -->
<script type="module" src="./js/app.js"></script>
</body>
</html>
